<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-clone/Sign-Up</title>
    <link rel="icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="CSS/login.css">
</head>

<body>
    <nav>
        <ul>
            <li class="logo"><a href="index.html"><img src="assets/images/logo.svg" alt="NETFLIX" width="150px" /></a>
            </li>
        </ul>
    </nav>
    <div class="sepa"></div>
    <div class="res">
        <h1 class="main-text" id="text">Enter your info to Sign Up</h1>
        <form>
            <input type="email" class="email" placeholder="  Email" required value="" id="mail"><br>
            <input type="password" class="pass" id="passwd" placeholder="  Password" required>
            <div class="btn">
                <input type="button" class="con" id="email" value="Sign Up" onclick="signup()">

            </div>
        </form>

        <div class="dropdown">
            <p class="menuBtn">Get Help ▾</p>

            <div class="menu">
                <p class="list">Use the Password</p>
                <p class="list">Use the Code</p>
            </div>
        </div>
    </div>

    <script>
        function signup(){
        const mail = document.getElementById("mail").value;
        const passwd = document.getElementById("passwd").value;
        let users = JSON.parse(localStorage.getItem("users")) || [];

        users.push({
            email: mail,
            password: passwd
        });

        localStorage.setItem("users", JSON.stringify(users));

        alert("Account Created");
    }

    </script>
</body>

</html>
