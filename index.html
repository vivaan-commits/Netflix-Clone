<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-clone</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="icon" href="assets/images/favicon.ico">
</head>

<body>
    <div class="main">
        <div class="box"></div>

        <nav>
            <div class="logo">
                <img src="assets/images/logo.svg" alt="NETFLIX" />
            </div>

            <div class="nav-right">
                <button class="btn btn-lang">English</button>
                <a href="login.html">
                    <button class="btn red-btn">Sign In</button>
                </a>
            </div>
        </nav>

        <div class="text">
            <h1 class="main-text"><b>Unlimited movies,<br>shows, and more</b></h1>
            <h5><b>Starts at ₹149. Cancel at any time.</b></h5>
            <h6>Ready to watch? Enter your email to create or restart your membership.</h6>
            <form action="login.html">
                <input type="email" placeholder="  Email Address" required>
                    <button type="submit" class="btn red-btn gs">Get Started ></button>
            </form>
        </div>

        <div class="sep"></div>
    </div>
</body>

</html>
