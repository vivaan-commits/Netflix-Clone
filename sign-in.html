<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix-clone/Login</title>
    <link rel="icon" href="assets/images/favicon.ico">
    <link rel="stylesheet" href="CSS/login.css">
</head>

<body>
    <nav>
        <ul>
            <li class="logo"><a href="index.html"><img src="assets/images/logo.svg" alt="NETFLIX" width="150px" /></a>
            </li>
        </ul>
    </nav>
    <div class="sepa"></div>
    <div class="res">
        <h1 class="main-text">Enter your info to Sign In</h1>
        <form action="null">
            <input type="email" class="email" id="mail" placeholder="  Email" required>
            <div class="btn">
                <input type="button" class="signin" id="email" value="Sign In" onclick="is_empty(); save_mail();">

            </div>
        </form>

        <div class="dropdown">
            <p class="menuBtn">Get Help ▾</p>

            <div class="menu">
                <p class="list">Use the Password</p>
                <p class="list">Use the Code</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
